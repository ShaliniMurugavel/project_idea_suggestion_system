<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks - itactuallyworks 🔖</title>
    <style>
        :root {
            --bg-primary: #f5f5f5; --bg-secondary: #ffffff;
            --text-primary: #333; --text-secondary: #666;
            --accent: #007bff; --shadow: rgba(0,0,0,0.1);
            --font: 'Segoe UI', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font); 
            background: var(--bg-primary); 
            color: var(--text-secondary); 
            line-height: 1.6; 
            min-height: 100vh; 
        }
        header { 
            background: var(--bg-secondary); 
            padding: 1.5rem 2rem; 
            box-shadow: 0 2px 10px var(--shadow); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        h1 { 
            color: var(--text-primary); 
            font-size: 1.8rem; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
        }
        .nav-links { display: flex; gap: 0; }
        .nav-links a { 
            color: var(--accent); 
            text-decoration: none; 
            margin: 0 0 0 1rem; 
            padding: 0.6rem 1.2rem; 
            border-radius: 6px; 
            transition: all 0.2s; 
            font-weight: 500; 
        }
        .nav-links a:hover { background: var(--accent); color: white; }
        
         main { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
         .project-card {
            background: var(--bg-secondary);
            padding: 1.8rem;
            border-radius: 16px;
            box-shadow: 0 8px 30px var(--shadow);
            border-left: 5px solid var(--accent);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), rgba(0,123,255,0.5));
        }
        .project-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 45px rgba(0,123,255,0.25); 
        }
        .stats-bar {
            background: var(--bg-secondary); 
            padding: 2rem; 
            border-radius: 12px; 
            margin-bottom: 2rem;
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            gap: 2rem; 
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        .stat-number { 
            font-size: 2.2rem; 
            color: var(--accent); 
            font-weight: bold; 
            margin-bottom: 0.25rem;
        }
        .stat-label { 
            color: var(--text-primary); 
            font-size: 0.95rem; 
            font-weight: 500;
        }
        
        .projects-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); 
            gap: 1.5rem; 
        }
        .btn { 
            flex: 1; 
            padding: 0.75rem 1rem; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary { 
            background: linear-gradient(45deg, var(--accent), #0056b3); 
            color: white; 
        }
        .btn-secondary { 
            background: transparent; 
            color: var(--accent); 
            border: 2px solid var(--accent);
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(0,123,255,0.3);
        }
        
        @media (max-width: 768px) { 
            main { padding: 0 1rem; } 
            header { flex-direction: column; gap: 1rem; padding: 1rem; } 
            .project-actions { flex-direction: column; }
            .projects-grid { grid-template-columns: 1fr; }
        }
        .project-badge {
            background: linear-gradient(45deg, var(--accent), #0056b3);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .project-title { 
            color: var(--text-primary); 
            font-size: 1.35rem; 
            margin-bottom: 0.75rem; 
            font-weight: 600;
            line-height: 1.3;
        }
        
        .project-meta { 
            display: flex; 
            gap: 0.75rem; 
            margin-bottom: 1rem; 
            flex-wrap: wrap;
        }
        .project-meta span {
            background: rgba(0,123,255,0.1);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .project-desc { 
            color: var(--text-secondary); 
            margin-bottom: 1.5rem; 
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .project-actions { 
            display: flex; 
            gap: 0.75rem; 
        }
        
    </style>
</head>
<body>
    <header>
        <h1>🔖 it'sactuallyworks</h1>
        <div class="nav-links">
            <a href="{% url 'users:homepage' %}">🏠 Home</a>
            <a href="{% url 'users:projects' %}">📋 Projects</a>
            <a href="{% url 'users:dashboard' %}">📊 Dashboard</a>
            <a href="{% url 'users:feedback' %}">💬 Feedback</a>
            <a href="{% url 'users:logout' %}">🚪 Logout</a>
        </div>
    </header>

    <main>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalBookmarks">0</div>
                <div class="stat-label">Saved Projects</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="domainCount">0</div>
                <div class="stat-label">Domains</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="beginnerProjects">0</div>
                <div class="stat-label">Beginner Projects</div>
            </div>
        </div>
        <h2>Saved Projects</h2>


        <div id="bookmarksList" class="projects-grid"></div>
        <div id="emptyState" class="empty-state" style="display:none;">
            <div class="empty-icon">🔖</div>
            <h3 class="empty-title">No Bookmarked Projects</h3>
            <p class="empty-text">Your saved projects will appear here. Start exploring to find perfect matches for your skills!</p>
            <a href="{% url 'users:projects' %}" class="btn btn-primary">🔍 Find Projects Now</a>
        </div>
    </main>

    <script>
        const projects = [
            {id:1,title:'AI Train Scheduler',domain:'AI/ML',level:'Intermediate',desc:'Optimize metro routes with ML—perfect for KMRL projects.',skills:'Python,Django'},
            {id:2,title:'Kaggle Explorer',domain:'Data Science',level:'Beginner',desc:'Upload CSVs for instant EDA & ML predictions.',skills:'Django,Pandas'},
            {id:3,title:'Secure Login',domain:'Cybersecurity',level:'Beginner',desc:'Full-stack authentication with encryption.',skills:'Flask,PostgreSQL'},
            {id:4,title:'ProjectHub Clone',domain:'Web Dev',level:'Advanced',desc:'Build your own project recommendation system!',skills:'React,Node.js'},
            {id:5,title:'Crypto Challenges',domain:'Cybersecurity',level:'Intermediate',desc:'Interactive cipher puzzles and challenges.',skills:'Python,HTMX'}
        ];

      function loadBookmarks() {

    let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];

    document.getElementById('totalBookmarks').textContent = bookmarks.length;

    let container = document.getElementById('bookmarksList');
    container.innerHTML = "";

    if (bookmarks.length === 0) {
        container.innerHTML = "<p>No bookmarked projects 😢</p>";
        return;
    }

    // NEW: domain counter
    let domains = new Set();
    let beginnerCount = 0;

    bookmarks.forEach(project => {

        if (typeof project !== "object") return;

        // collect domains
        if(project.domain){
            domains.add(project.domain);
        }
        if(project.level && project.level.toLowerCase() === "beginner"){
        beginnerCount++;
    }
        let div = document.createElement("div");

        div.innerHTML = `
            <div class="project-card">

                <div class="project-badge">${project.badge || "Saved"}</div>

                <h3 class="project-title">${project.title}</h3>

                <div class="project-meta">
                    <span>${project.domain}</span>
                    <span>${project.level}</span>
                </div>

                <h3 class="project-desc">${project.desc}</h3>

                <div class="project-actions">
                    <button class="btn btn-primary" onclick="viewDetails(${project.id})">
                        👁️ View
                    </button>

                    <button class="btn btn-secondary" onclick="removeBookmark(${project.id})">
                        ❌ Remove
                    </button>
                </div>

            </div>
        `;

        container.appendChild(div);
    });

    // show domain count
    document.getElementById("domainCount").textContent = domains.size;
    document.getElementById("beginnerProjects").textContent = beginnerCount;
}

   
        function viewDetails(id){ 
            localStorage.setItem('selectedProject',id); 
            window.location.href='projectdetail.html'; 
        }
        function removeBookmark(id){
            let bookmarks = JSON.parse(localStorage.getItem('bookmarks'))||[];
            bookmarks = bookmarks.filter(b => b.id !== id);
            localStorage.setItem('bookmarks',JSON.stringify(bookmarks));
            loadBookmarks();
        }

        document.addEventListener('DOMContentLoaded',loadBookmarks);
    </script>
</body>
</html>
